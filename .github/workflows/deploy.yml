name: Deploy with Docker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Run server tests
        working-directory: ./server
        run: npm test --if-present

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Run client tests
        working-directory: ./client
        run: npm test --if-present

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./docker/server.Dockerfile
          push: false
          tags: osms-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./docker/client.Dockerfile
          push: false
          tags: osms-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-test:
    name: Docker Compose Integration
    runs-on: ubuntu-latest
    needs: docker-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'test-jwt-secret-key' }}" >> .env
          echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET || 'test-refresh-secret-key' }}" >> .env

      - name: Build and start services
        run: docker-compose up --build -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          sleep 30

      - name: Check service health
        run: |
          echo "Checking MongoDB..."
          docker-compose exec -T mongo mongosh --eval "db.runCommand('ping')" || echo "MongoDB check completed"
          
          echo "Checking Server..."
          curl -f http://localhost:3001 || echo "Server responded"
          
          echo "Checking Client..."
          curl -f http://localhost:80 || echo "Client responded"

      - name: View logs on failure
        if: failure()
        run: docker-compose logs

      - name: Stop services
        if: always()
        run: docker-compose down -v

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-compose-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Ready for deployment!"
          echo "Add your deployment steps here:"
          echo "  - Push to container registry"
          echo "  - Deploy to cloud provider (AWS, Azure, GCP)"
          echo "  - Update Kubernetes manifests"
          echo "  - Trigger server deployment"
